name: CI

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main", "develop"]

jobs:
  lint:
    name: Lint (Ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Ruff linter
        run: pipx run ruff check src/backend/

      - name: Run Ruff formatter check
        run: pipx run ruff format --check src/backend/

  test:
    name: Tests
    runs-on: ubuntu-latest
    env:
      DJANGO_SETTINGS_MODULE: config.settings.development
      SECRET_KEY: ci-secret-key-not-for-production
      DB_NAME: vilapay_ci
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_HOST: localhost
      DB_PORT: 5432
      REDIS_URL: redis://localhost:6379/0
      NOMBA_CLIENT_ID: test
      NOMBA_CLIENT_SECRET: test
      NOMBA_ACCOUNT_ID: test

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: vilapay_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: requirements/base.txt

      - name: Install dependencies
        run: pip install -r requirements/base.txt

      - name: Django system check
        run: python manage.py check

      - name: Run migrations
        run: python manage.py migrate

      - name: Run tests
        run: |
          python manage.py test \
            apps.users apps.groups apps.wallets apps.payments apps.payouts \
            --parallel auto \
            --verbosity=2

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: requirements/base.txt

      - name: Install dependencies and security tools
        run: pip install bandit pip-audit -r requirements/base.txt

      - name: Bandit — Python SAST
        run: |
          bandit -r src/backend/ \
            -ll \
            --exclude src/backend/apps/*/migrations,src/backend/apps/*/tests.py \
            --configfile pyproject.toml

      - name: pip-audit — dependency vulnerability check
        run: pip-audit -r requirements/base.txt
