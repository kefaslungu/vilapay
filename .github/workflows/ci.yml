name: CI

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main", "develop"]

jobs:
  lint:
    name: Lint (Ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install Ruff
        run: pip install ruff

      - name: Run Ruff linter
        run: ruff check src/backend/

      - name: Run Ruff formatter check
        run: ruff format --check src/backend/

  check:
    name: Django System Check
    runs-on: ubuntu-latest
    env:
      DJANGO_SETTINGS_MODULE: config.settings.development
      SECRET_KEY: ci-secret-key-not-for-production
      DB_NAME: vilapay_ci
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_HOST: localhost
      DB_PORT: 5432
      REDIS_URL: redis://localhost:6379/0
      NOMBA_CLIENT_ID: test
      NOMBA_CLIENT_SECRET: test
      NOMBA_ACCOUNT_ID: test

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: vilapay_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Cache pip
        uses: actions/cache@v6
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements/base.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements/base.txt

      - name: Django system check
        run: python manage.py check

  test:
    name: Tests
    runs-on: ubuntu-latest
    env:
      DJANGO_SETTINGS_MODULE: config.settings.development
      SECRET_KEY: ci-secret-key-not-for-production
      DB_NAME: vilapay_ci
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_HOST: localhost
      DB_PORT: 5432
      REDIS_URL: redis://localhost:6379/0
      NOMBA_CLIENT_ID: test
      NOMBA_CLIENT_SECRET: test
      NOMBA_ACCOUNT_ID: test

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: vilapay_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Cache pip
        uses: actions/cache@v6
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements/base.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements/base.txt

      - name: Run migrations
        run: python manage.py migrate

      - name: Run tests
        run: |
          python manage.py test \
            apps.users apps.groups apps.wallets apps.payments apps.payouts \
            --verbosity=2

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Cache pip
        uses: actions/cache@v6
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-security-${{ hashFiles('requirements/base.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-security-

      - name: Install security tools
        run: pip install bandit pip-audit

      - name: Bandit — Python SAST
        # Scans for common security issues: hardcoded secrets, unsafe functions,
        # SQL injection patterns, subprocess misuse, etc.
        # -r  recursive
        # -ll report medium severity and above (low is too noisy)
        # -x  exclude migrations and test files
        run: |
          bandit -r src/backend/ \
            -ll \
            --exclude src/backend/apps/*/migrations,src/backend/apps/*/tests.py \
            --configfile pyproject.toml

      - name: pip-audit — dependency vulnerability check
        # Checks all installed packages against the PyPI Advisory Database.
        # Fails the build if any known vulnerability exists in a pinned dep.
        run: |
          pip install -r requirements/base.txt
          pip-audit -r requirements/base.txt
