[tool.ruff]
target-version = "py313"
line-length = 88
src = ["src/backend"]

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort
    "B",   # flake8-bugbear
    "C4",  # flake8-comprehensions
    "UP",  # pyupgrade
]
ignore = [
    "E501",  # line too long — handled by formatter
    "B008",  # do not perform function calls in default arguments (Django uses this)
]

[tool.ruff.lint.per-file-ignores]
"*/migrations/*" = ["E501", "F401"]
"*/settings/*" = ["F405", "F403"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
